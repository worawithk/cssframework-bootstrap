<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ลงทะเบียนผู้ป่วย</title>
    <!-- Bootstrap CSS (latest v5) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="./styles/sample-form.css" />
  </head>
  <body>
    <div class="form-container">
      <div
        class="form-header d-flex justify-content-between align-items-center mb-4"
      >
        <h1 class="form-title mb-0">ลงทะเบียนผู้ป่วย</h1>
        <button
          id="themeToggle"
          type="button"
          class="btn btn-outline-secondary btn-sm theme-toggle"
          aria-label="Toggle dark mode"
          title="Toggle dark mode"
        >
          🌙
        </button>
      </div>

      <form id="patientForm" class="needs-validation" novalidate>
        <!-- ชื่อ -->
        <div class="mb-3">
          <label for="firstName" class="form-label">ชื่อ</label>
          <input
            type="text"
            class="form-control"
            id="firstName"
            placeholder="กรุณากรอกชื่อ"
            required
          />
          <div class="invalid-feedback">⚠️ กรุณากรอกชื่อ</div>
        </div>

        <!-- นามสกุล -->
        <div class="mb-3">
          <label for="lastName" class="form-label">นามสกุล</label>
          <input
            type="text"
            class="form-control"
            id="lastName"
            placeholder="กรุณากรอกนามสกุล"
            required
          />
          <div class="invalid-feedback">⚠️ กรุณากรอกนามสกุล</div>
        </div>

        <!-- อายุ -->
        <div class="mb-3">
          <label for="age" class="form-label">อายุ</label>
          <div class="age-input-wrap">
            <input
              type="range"
              class="form-range"
              id="age"
              min="1"
              max="200"
              value="18"
            />
            <span class="range-value" id="ageDisplay">18</span>
          </div>
        </div>

        <!-- เบอร์โทรศัพท์ -->
        <div class="mb-3">
          <label for="phone" class="form-label">เบอร์โทรศัพท์</label>
          <input
            type="text"
            class="form-control"
            id="phone"
            placeholder="กรุณากรอกเบอร์โทรศัพท์ เช่น 0812345678"
            required
          />
          <div class="invalid-feedback" id="phoneRequired">
            ⚠️ กรุณากรอกเบอร์โทรศัพท์
          </div>
          <div class="invalid-feedback" id="phoneInvalid">
            ⚠️ เบอร์โทรศัพท์ต้องเริ่มต้นด้วย 0 และมีความยาวไม่เกิน 10 ตัวอักษร
          </div>
        </div>

        <!-- ความเร่งด่วน -->
        <div class="mb-4">
          <label for="urgency" class="form-label">ความเร่งด่วน</label>
          <select class="form-select" id="urgency" required>
            <option value="">-- เลือกความเร่งด่วน --</option>
            <option value="normal">ปกติ</option>
            <option value="urgent">เร่งด่วน</option>
            <option value="emergency">ฉุกเฉิน</option>
          </select>
          <div class="invalid-feedback">⚠️ กรุณาเลือกความเร่งด่วน</div>
        </div>

        <!-- ปุ่มบันทึก -->
        <button type="submit" class="btn btn-primary btn-submit">
          บันทึกข้อมูล
        </button>
      </form>
    </div>

    <!-- Bootstrap JS bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Form validation and interactions -->
    <script src="./js/sample-form-validation.js" defer></script>
  </body>
</html>
